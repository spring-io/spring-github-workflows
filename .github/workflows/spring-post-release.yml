name: Perform Post Release Procedures

on:
  workflow_call:
    inputs:
      milestone:
        description: 'Milestone title, e.g 3.0.0-M1, 3.1.0-RC1, 3.2.0 etc.'
        required: true
        type: string
      hotfix:
        description: 'If just released milestone is a hotfix, e.g 3.1.10.1'
        required: true
        type: string

    secrets:
      SPRING_RELEASE_CHAT_WEBHOOK_URL:
        required: false
      GH_ACTIONS_REPO_TOKEN:
        required: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


jobs:
  post-release:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Update Spring IO website for new version
        if: ${{ inputs.hotfix != 'true' }}
        uses: spring-io/spring-github-workflows/.github/actions/spring-website-project-version-update@main
        with:
          newVersion: ${{ inputs.milestone }}
          token: ${{ secrets.GH_ACTIONS_REPO_TOKEN }}

      - name: Announce Release in Chat
        if: env.CHAT_WEBHOOK_URL
        uses: spring-io/spring-release-actions/announce-on-gchat@0.0.5
        with:
          gchat-webhook-url: ${{ env.CHAT_WEBHOOK_URL }}
          version: ${{ inputs.milestone }}
        env:
          CHAT_WEBHOOK_URL: ${{ secrets.SPRING_RELEASE_CHAT_WEBHOOK_URL }}

      - id: support-window
        if: ${{ inputs.hotfix != 'true' && !contains(inputs.milestone, '-') }}
        uses: spring-io/spring-release-actions/compute-support-window@0.0.5

      - id: next-milestone
        if: ${{ inputs.hotfix != 'true' && steps.support-window.outputs.support-type != 'eol' }}
        continue-on-error: true
        uses: spring-io/spring-release-actions/compute-next-version@0.0.5
        with:
          version: ${{ inputs.milestone }}

      # No due_on on the next milestone according to the day/week pattern since release might be skipped for next month
      - name: Create Next Milestone
        if: ${{ inputs.hotfix != 'true' && steps.next-milestone.outputs.version }}
        run: gh api repos/$GITHUB_REPOSITORY/milestones -f title=${{ steps.next-milestone.outputs.version }} || true
